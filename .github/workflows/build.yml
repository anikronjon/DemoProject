name: Build

on:
  push:
    branches: ["master", "main"]
  release:
    types: [created]
  workflow_dispatch:

jobs:
  build:
    name: Build — ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact: oqe-linux-x86_64
            binary: oqe
          - os: windows-latest
            artifact: oqe-windows-x86_64
            binary: oqe.exe
          - os: macos-latest
            artifact: oqe-macos-x86_64
            binary: oqe

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Install system deps (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get install -y libssl-dev pkg-config

      - name: Build
        run: cargo build --release

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: target/release/${{ matrix.binary }}
          retention-days: 30
